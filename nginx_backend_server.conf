server {
    listen 8001 default_server;
    listen 8002 default_server;
    listen 8003 default_server;
    listen [::]:8001 default_server;
    listen [::]:8002 default_server;
    listen [::]:8003 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
