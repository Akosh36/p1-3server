user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Upstream block - Docker container nomlari orqali
    upstream backend {
        server web_server_4:80 max_fails=3 fail_timeout=10s;
        server web_server_5:80 max_fails=3 fail_timeout=10s;
        server web_server_2:80 max_fails=3 fail_timeout=10s;
        server web_server_3:80 max_fails=3 fail_timeout=10s;

        keepalive 32;
    }

    # Rate limiting zone
    limit_req_zone $binary_remote_addr zone=general:10m rate=100r/s;

    # ==========================================
    # USER LAN (Standard Access)
    # Port: 8082
    # ==========================================
    server {
        listen 8082 default_server;
        listen [::]:8082 default_server;
        server_name _;

        access_log /var/log/nginx/user_access.log main;
        error_log /var/log/nginx/user_error.log warn;

        limit_req zone=general burst=200 nodelay;

        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_redirect off;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # ==========================================
    # ADMIN LAN (Full Control)
    # Port: 8080
    # ==========================================
    server {
        listen 8080;
        listen [::]:8080;
        server_name _;

        access_log /var/log/nginx/admin_access.log main;
        error_log /var/log/nginx/admin_error.log warn;

        # Admin - to'liq ruxsat: dashboard va backend
        location / {
            proxy_pass http://172.20.0.1:5000;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_redirect off;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # ==========================================
    # READER LAN (View-Only / Auditor)
    # Port: 8081
    # ==========================================
    server {
        listen 8081;
        listen [::]:8081;
        server_name _;

        access_log /var/log/nginx/reader_access.log main;
        error_log /var/log/nginx/reader_error.log warn;


        location / {
            # Block POST/PUT/DELETE for readers
            if ($request_method !~ ^(GET|HEAD)$) {
                return 403 "Forbidden: Reader role - faqat ko'rish mumkin.\n";
            }

            proxy_pass http://172.20.0.1:5000;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_redirect off;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
