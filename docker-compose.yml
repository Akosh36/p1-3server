networks:
  lb_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

services:
  web_server_1:
    image: nginx:alpine
    container_name: web_server_1
    ports:
      - "8001:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
    networks:
      lb_network:
        ipv4_address: 172.20.0.11
    restart: unless-stopped

  web_server_2:
    image: nginx:alpine
    container_name: web_server_2
    ports:
      - "8002:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
    networks:
      lb_network:
        ipv4_address: 172.20.0.12
    restart: unless-stopped

  web_server_3:
    image: nginx:alpine
    container_name: web_server_3
    ports:
      - "8003:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
    networks:
      lb_network:
        ipv4_address: 172.20.0.13
    restart: unless-stopped

  web_server_5:
    image: nginx:alpine
    container_name: web_server_5
    ports:
      - "8005:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
    networks:
      lb_network:
        ipv4_address: 172.20.0.15
    restart: unless-stopped

  web_server_4:
    image: nginx:alpine
    container_name: web_server_4
    ports:
      - "8004:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
    networks:
      lb_network:
        ipv4_address: 172.20.0.14
    restart: unless-stopped

  load_balancer:
    image: nginx:alpine
    container_name: load_balancer
    ports:
      - "8080:8080"
      - "8081:8081"
      - "8082:8082"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      lb_network:
        ipv4_address: 172.20.0.2
    depends_on:
      - web_server_4
      - web_server_5
      - web_server_1
      - web_server_2
      - web_server_3
    restart: unless-stopped
